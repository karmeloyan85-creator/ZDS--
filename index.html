<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Зарплаты — Земский доктор-стоматолог</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:linear-gradient(135deg,#0c1929 0%,#132f4c 100%);
  --bg-solid:#0c1929;
  --card:rgba(255,255,255,0.04);
  --card-solid:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);
  --accent:#38bdf8;
  --accent-dark:#0284c7;
  --accent-light:#7dd3fc;
  --green:#4ade80;
  --yellow:#fbbf24;
  --red:#f87171;
  --text:#f1f5f9;
  --text2:#94a3b8;
  --input-bg:rgba(255,255,255,0.05);
  --radius:10px;
  --radius-sm:6px;
  --radius-btn:8px;
  --shadow:0 2px 8px rgba(0,0,0,0.2);
}
body{font-family:system-ui,-apple-system,Arial,sans-serif;background:var(--bg-solid);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;background-image:var(--bg);background-attachment:fixed}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:rgba(255,255,255,0.08);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.login-box h2{text-align:center;margin-bottom:8px;color:var(--accent);font-size:22px;font-weight:700}
.login-box .login-sub{text-align:center;margin-bottom:24px;color:var(--text2);font-size:13px}
.login-box input{width:100%;padding:12px 14px;margin:8px 0;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius-sm);color:var(--text);font-size:14px;transition:border .2s}
.login-box input:focus{outline:none;border-color:var(--accent)}
.login-box button{width:100%;padding:14px;margin-top:16px;background:linear-gradient(135deg,#38bdf8,#0284c7);color:#fff;border:none;border-radius:var(--radius-btn);cursor:pointer;font-size:15px;font-weight:600;transition:opacity .2s;box-shadow:0 4px 12px rgba(56,189,248,0.3)}
.login-box button:hover{opacity:.9}

/* Header */
.header{background:rgba(255,255,255,0.05);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.08);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:16px;color:var(--accent);font-weight:700;letter-spacing:.3px}
.header .user-info{color:var(--text2);font-size:13px;display:flex;align-items:center;gap:10px}
.header button{background:none;border:1px solid rgba(255,255,255,0.1);color:var(--text2);padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;transition:all .2s}
.header button:hover{border-color:var(--accent);color:var(--accent)}

/* Tabs */
.tabs{display:flex;overflow-x:auto;background:var(--card-solid);border-bottom:1px solid var(--border);padding:0 12px}
.tabs button{padding:10px 16px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.tabs button:hover{color:var(--text)}
.tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Content */
.content{padding:20px;max-width:960px;margin:0 auto}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.card h3{margin-bottom:10px;color:var(--accent);font-size:14px;font-weight:600}
.card h4{margin-bottom:8px;color:var(--text);font-size:13px;font-weight:600}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:7px 9px;border-bottom:1px solid var(--border);text-align:left}
th{color:var(--text2);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px;background:rgba(255,255,255,.02)}
tr:hover td{background:rgba(255,255,255,.02)}

/* Inputs */
input[type=number],input[type=text],input[type=time],input[type=password],input[type=date],input[type=search],select,textarea{background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:7px 10px;font-size:13px;width:100%}
input[type=number]{width:90px}
input[type=time]{width:100px}
select{cursor:pointer}
textarea{resize:vertical;min-height:60px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}

/* Buttons */
.btn{padding:8px 18px;border:none;border-radius:var(--radius-btn);cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#38bdf8,#0284c7);color:#fff;box-shadow:0 2px 8px rgba(56,189,248,0.25)}
.btn-primary:hover{opacity:.9}
.btn-success{background:#4ade80;color:#052e16}
.btn-danger{background:#f87171;color:#fff}
.btn-warning{background:#fbbf24;color:#422006}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}

/* Month nav */
.month-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.month-nav button{background:var(--card-solid);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:var(--radius);cursor:pointer;font-size:13px}
.month-nav button:hover{border-color:var(--accent);color:var(--accent)}
.month-nav span{font-size:15px;font-weight:600;min-width:160px;text-align:center}

/* Employee cards */
.emp-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s}
.emp-card:hover{border-color:rgba(56,189,248,0.2);transform:translateY(-1px)}
.emp-card .emp-name{font-weight:600;font-size:14px;margin-bottom:3px}
.emp-card .emp-pos{color:var(--text2);font-size:12px;margin-bottom:8px}
.emp-card .emp-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px;font-size:13px}
.emp-card .emp-stats div{background:var(--input-bg);padding:7px;border-radius:var(--radius)}
.emp-card .emp-stats .label{color:var(--text2);font-size:11px}
.emp-card .emp-stats .val{font-weight:600;font-size:14px}
.val-money{color:var(--green)}
.val-total{color:var(--accent);font-size:16px!important}
.fot-total{text-align:right;padding:14px;font-size:18px;font-weight:700;color:var(--accent)}
.row-btns{display:flex;gap:4px;flex-wrap:wrap}
.table-wrap{overflow-x:auto}

/* Settings */
.settings-section{margin-bottom:20px}
.settings-section h3,.settings-section h4{margin-bottom:10px;color:var(--accent);font-size:14px}
.settings-row{display:flex;gap:10px;align-items:end;margin-bottom:8px;flex-wrap:wrap}
.settings-row label{font-size:12px;color:var(--text2);min-width:100px}
.settings-row input,.settings-row select{max-width:200px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--card-solid);border:1px solid var(--green);color:var(--green);padding:10px 18px;border-radius:var(--radius);font-size:13px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

.empty-msg{color:var(--text2);text-align:center;padding:24px;font-size:13px}

.position-tag{display:inline-block;background:var(--input-bg);border:1px solid var(--border);padding:3px 8px;border-radius:var(--radius);margin:3px;font-size:12px}
.position-tag .del-pos{cursor:pointer;color:var(--red);margin-left:5px}

.hidden{display:none!important}

/* Schedule Calendar */
.schedule-wrap{overflow-x:auto;margin-top:14px}
.schedule-table{border-collapse:collapse;font-size:12px;min-width:100%}
.schedule-table th,.schedule-table td{padding:4px 6px;text-align:center;border:1px solid var(--border);min-width:36px;max-width:44px;height:36px;vertical-align:middle}
.schedule-table th.name-col{position:sticky;left:0;z-index:2;min-width:160px;max-width:180px;text-align:left;background:var(--card-solid);font-weight:600;color:var(--text);font-size:12px;border-right:2px solid var(--border)}
.schedule-table td.name-col{position:sticky;left:0;z-index:2;min-width:160px;max-width:180px;text-align:left;background:var(--card-solid);font-weight:500;font-size:12px;border-right:2px solid var(--border)}
.schedule-table .day-header{font-size:11px;position:relative}
.schedule-table .day-header.weekend{background:rgba(248,113,113,0.12);color:var(--red)}
.schedule-table .day-header.today{background:rgba(45,212,191,0.15);box-shadow:inset 0 -2px 0 var(--accent)}
.schedule-table .day-num{font-weight:600;font-size:12px}
.schedule-table .day-name{font-size:10px;color:var(--text2)}
.schedule-table .shift-cell{cursor:pointer;transition:background .15s;position:relative}
.schedule-table .shift-cell:hover{background:rgba(45,212,191,0.12)}
.schedule-table .shift-cell.working{background:rgba(52,211,153,0.2)}.schedule-table .shift-cell.vacation{background:rgba(45,212,191,0.12);color:var(--accent)}.schedule-table .shift-cell.practice{background:rgba(168,85,247,0.15);color:#c084fc}.schedule-table .shift-cell.weekend{background:rgba(248,113,113,0.06)}.schedule-table .shift-cell.weekend.off{background:rgba(248,113,113,0.18);color:var(--red)}.schedule-table .shift-cell .shift-label{font-size:11px;font-weight:600}.schedule-table .shift-cell .shift-label.s-work{color:var(--green)}.schedule-table .shift-cell .shift-label.s-vacation{color:var(--accent)}.schedule-table .shift-cell .shift-label.s-off{color:var(--red)}.schedule-table .shift-cell .shift-label.s-practice{color:#c084fc}.schedule-table .day-header.today-col{outline:2px solid var(--accent);outline-offset:-2px;border-radius:2px}
.schedule-table .shift-cell.today-cell{outline:2px solid var(--accent);outline-offset:-2px;border-radius:2px}
.schedule-controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}

/* Role badge */
.role-badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600}
.role-badge.owner{background:rgba(45,212,191,0.2);color:var(--accent)}
.role-badge.manager{background:rgba(52,211,153,0.2);color:var(--green)}
.role-badge.admin{background:rgba(251,191,36,0.2);color:var(--yellow)}
.role-badge.none{background:rgba(148,163,184,0.15);color:var(--text2)}

@media(max-width:600px){
  .content{padding:12px}
  .card{padding:12px}
  .emp-card .emp-stats{grid-template-columns:1fr 1fr}
  .header h1{font-size:14px}
  .schedule-table th,.schedule-table td{min-width:30px;padding:3px 4px}
}
</style>
</head>
<body>

<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
(function(){
const LS={
  get(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}},
  set(k,v){localStorage.setItem(k,JSON.stringify(v))},
  del(k){localStorage.removeItem(k)}
};

function initDefaults(){
  if(!LS.get('zp_employees')){
    const emps=[
      {id:1,name:'Мелоян Карен Наирович',position:'Врач-стоматолог',calcType:'percent',fixedDay:0,fixedMonth:0,percent:30,active:true,appRole:'owner',login:'karen',pass:'zemskiy2026'},
      {id:2,name:'Баласанян Амаля Арамовна',position:'Врач-стоматолог',calcType:'percent',fixedDay:0,fixedMonth:0,percent:25,active:true},
      {id:3,name:'Кялоян Мгер Шаваршович',position:'Врач-стоматолог',calcType:'percent',fixedDay:0,fixedMonth:0,percent:30,active:true},
      {id:4,name:'Сидорейко Илья Михайлович',position:'Врач-стоматолог',calcType:'percent',fixedDay:0,fixedMonth:0,percent:25,active:true},
      {id:5,name:'Громов Ростислав Евгеньевич',position:'Врач-стоматолог',calcType:'percent',fixedDay:0,fixedMonth:0,percent:30,active:true},
      {id:6,name:'Меркулова Ангелина Олеговна',position:'Медсестра',calcType:'fixed_day_percent',fixedDay:1200,fixedMonth:0,percent:5,active:true},
      {id:7,name:'Соколова Елизавета Алексеевна',position:'Администратор',calcType:'fixed_day',fixedDay:2000,fixedMonth:0,percent:0,active:true},
      {id:8,name:'Алферова Татьяна Алексеевна',position:'Администратор',calcType:'fixed_day',fixedDay:2000,fixedMonth:0,percent:0,active:true},
      {id:9,name:'Белова Ирина Юрьевна',position:'Администратор',calcType:'fixed_day',fixedDay:1500,fixedMonth:0,percent:0,active:true},
      {id:10,name:'Киреева Ирина Алексеевна',position:'Администратор',calcType:'fixed_day',fixedDay:2500,fixedMonth:0,percent:0,active:true},
      {id:11,name:'Собиров Азим',position:'Ассистент',calcType:'fixed_day',fixedDay:5000,fixedMonth:0,percent:0,active:true},
      {id:12,name:'Максименко Надежда Петровна',position:'Другое',calcType:'fixed_month',fixedDay:0,fixedMonth:12000,percent:0,active:true},
      {id:13,name:'Москалева',position:'Другое',calcType:'fixed_month',fixedDay:0,fixedMonth:30000,percent:0,active:true},
      {id:14,name:'Азарко Оксана Владимировна',position:'Управляющий',calcType:'fixed_month',fixedDay:0,fixedMonth:30000,percent:0,active:true,appRole:'manager',login:'manager',pass:'manager123'},
      {id:15,name:'Титяева Оксана Дмитриевна',position:'Ассистент',calcType:'fixed_day',fixedDay:500,fixedMonth:0,percent:0,active:true},
      {id:16,name:'Скобелева Юлия Сергеевна',position:'Ассистент',calcType:'fixed_day',fixedDay:500,fixedMonth:0,percent:0,active:true},
      {id:17,name:'Линникова Виктория Михайловна',position:'Администратор',calcType:'fixed_day',fixedDay:500,fixedMonth:0,percent:0,active:true,appRole:'admin',login:'admin',pass:'admin123'}
    ];
    LS.set('zp_employees',emps);
  }
  if(!LS.get('zp_positions')){
    LS.set('zp_positions',['Врач-стоматолог','Врач-хирург','Врач-терапевт','Ассистент','Администратор','Медсестра','Гигиенист','Управляющий','Другое']);
  }
  if(!LS.get('zp_creds')){
    LS.set('zp_creds',{owner:{login:'karen',pass:'zemskiy2026'},manager:{login:'manager',pass:'manager123'},admin:{login:'admin',pass:'admin123'}});
  }
}
initDefaults();

let state={
  role:null,
  empId:null,
  tab:'daily',
  month:new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0'),
  reportDate:todayStr()
};

function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

function empIdGen(){const emps=LS.get('zp_employees',[]);return emps.length?Math.max(...emps.map(e=>e.id))+1:1}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function addHistory(text){
  const h=LS.get('zp_history',[]);
  h.unshift({date:todayStr(),time:new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}),text,user:state.role||'system'});
  if(h.length>200)h.length=200;
  LS.set('zp_history',h);
}

function getEmps(){return LS.get('zp_employees',[])}
function getActiveEmps(){return getEmps().filter(e=>e.active)}
function getPositions(){return LS.get('zp_positions',[])}

function calcSalary(emp,worked,totalRevenue){
  const ct=emp.calcType;
  let salary=0;
  if(ct==='fixed_day') salary=Math.round(emp.fixedDay*worked);
  else if(ct==='fixed_month') salary=emp.fixedMonth;
  else if(ct==='percent') salary=Math.round(totalRevenue*emp.percent/100);
  else if(ct==='fixed_day_percent') salary=Math.round(emp.fixedDay*worked+totalRevenue*emp.percent/100);
  else if(ct==='fixed_month_percent') salary=Math.round(emp.fixedMonth+totalRevenue*emp.percent/100);
  else if(ct==='fixed_day_percent_own') salary=Math.round(emp.fixedDay*worked+(emp._ownRevenue||0)*emp.percent/100);
  return salary;
}

function monthDays(ym){
  const[y,m]=ym.split('-').map(Number);
  const days=[];
  const d=new Date(y,m-1,1);
  while(d.getMonth()===m-1){days.push(fmtDate(d));d.setDate(d.getDate()+1)}
  return days;
}

function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

function monthName(ym){
  const months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  return months[(parseInt(ym.split('-')[1]))-1]+' '+ym.split('-')[0];
}

function isDoctor(emp){
  return emp.position.includes('Врач');
}

function roleLabel(r){
  if(r==='owner')return 'Владелец';
  if(r==='manager')return 'Управляющая';
  if(r==='admin')return 'Администратор';
  return '';
}

function render(){
  const app=document.getElementById('app');
  const session=LS.get('zp_session',null);
  if(!session||!session.role){
    app.innerHTML=renderLogin();
    bindLogin();
  } else {
    state.role=session.role;
    state.empId=session.empId||null;
    app.innerHTML=renderApp();
    bindApp();
  }
}

// ========== LOGIN ==========
function renderLogin(){
  return `<div class="login-wrap"><div class="login-box">
    <h2>🦷 Земский доктор</h2>
    <div class="login-sub">Система управления зарплатами</div>
    <input type="text" id="login-input" placeholder="Логин" autocomplete="username">
    <input type="password" id="pass-input" placeholder="Пароль" autocomplete="current-password">
    <button id="login-btn">Войти</button>
  </div></div>`;
}

function bindLogin(){
  const btn=document.getElementById('login-btn');
  const enter=()=>doLogin();
  btn.onclick=enter;
  document.getElementById('pass-input').onkeydown=e=>{if(e.key==='Enter')enter()};
}

function doLogin(){
  const login=document.getElementById('login-input').value.trim();
  const pass=document.getElementById('pass-input').value;
  if(!login||!pass){toast('Введите логин и пароль');return}

  // Check legacy zp_creds first
  const creds=LS.get('zp_creds',{});
  let role=null;
  for(const[r,c] of Object.entries(creds)){
    if(c.login===login&&c.pass===pass){role=r;break}
  }

  // Check employee-based credentials
  let empMatchId=null;
  if(!role){
    const emps=getEmps();
    for(const e of emps){
      if(e.appRole&&e.appRole!=='none'&&e.login===login&&e.pass===pass){
        role=e.appRole;
        empMatchId=e.id;
        break;
      }
    }
  }

  if(!role){toast('Неверный логин или пароль');return}
  LS.set('zp_session',{login,role,empId:empMatchId});
  addHistory('Вход: '+login+' ('+role+')');
  state.role=role;
  state.empId=empMatchId;
  if(role==='owner')state.tab='daily';
  else if(role==='manager')state.tab='daily';
  else state.tab='report';
  render();
}

function logout(){
  LS.del('zp_session');
  state.role=null;
  state.empId=null;
  render();
}

// ========== TABS ==========
function getTabs(){
  const r=state.role;
  if(r==='owner')return[
    {id:'daily',icon:'📅',label:'Ввод за день'},
    {id:'monthly',icon:'📊',label:'Расчёт за месяц'},
    {id:'schedule',icon:'🗓',label:'График'},
    {id:'admin-report',icon:'📑',label:'Отчёт администратора'},
    {id:'employees',icon:'👥',label:'Сотрудники'},
    {id:'settings',icon:'⚙️',label:'Настройки'}
  ];
  if(r==='manager')return[
    {id:'daily',icon:'📅',label:'Ввод за день'},
    {id:'monthly',icon:'📊',label:'Расчёт за месяц'},
    {id:'schedule',icon:'🗓',label:'График'}
  ];
  return[{id:'report',icon:'📋',label:'Мой отчёт'}];
}

function renderApp(){
  const tabs=getTabs();
  if(!tabs.find(t=>t.id===state.tab))state.tab=tabs[0].id;
  let html=`<div class="header"><h1>🦷 Земский доктор-стоматолог</h1><div class="user-info">${roleLabel(state.role)} (${LS.get('zp_session',{}).login||''})<button onclick="logout()">Выйти</button></div></div>`;
  html+=`<div class="tabs">`;
  for(const t of tabs){
    html+=`<button class="${t.id===state.tab?'active':''}" data-tab="${t.id}">${t.icon} ${t.label}</button>`;
  }
  html+=`</div><div class="content">${renderTab()}</div>`;
  return html;
}

function renderTab(){
  if(state.tab==='daily')return renderDaily();
  if(state.tab==='monthly')return renderMonthly();
  if(state.tab==='schedule')return renderSchedule();
  if(state.tab==='admin-report')return renderAdminReportView();
  if(state.tab==='employees')return renderEmployees();
  if(state.tab==='settings')return renderSettings();
  if(state.tab==='report')return renderAdminForm();
  return'';
}

function switchTab(tab){state.tab=tab;render()}

function bindApp(){
  document.querySelectorAll('.tabs button').forEach(b=>{
    b.onclick=()=>switchTab(b.dataset.tab);
  });
  bindTabContent();
}

function bindTabContent(){
  if(state.tab==='daily')bindDaily();
  if(state.tab==='monthly')bindMonthly();
  if(state.tab==='schedule')bindSchedule();
  if(state.tab==='admin-report')bindAdminReportView();
  if(state.tab==='employees')bindEmployees();
  if(state.tab==='settings')bindSettings();
  if(state.tab==='report')bindAdminForm();
}

// ========== DAILY INPUT ==========
function renderDaily(){
  const today=todayStr();
  const emps=getActiveEmps();
  const data=LS.get('zp_daily_'+today,{});
  const isOwner=state.role==='owner';
  let html=`<div class="card"><h3>📅 Ввод данных за день</h3>
    <div style="margin-bottom:14px"><label>Дата: </label><input type="date" id="daily-date" value="${today}"></div>
    <div class="table-wrap"><table>
    <tr><th>Сотрудник</th><th>Должность</th><th>Смен/дней</th>${isOwner?'<th>Выручка ₽</th>':''}<th>Пациентов</th></tr>`;
  for(const e of emps){
    if(e.calcType==='fixed_month')continue;
    const d=data[e.id]||{};
    html+=`<tr data-emp="${e.id}">
      <td>${e.name}</td><td>${e.position}</td>
      <td><input type="number" class="daily-worked" data-id="${e.id}" value="${d.worked||0}" min="0" step="0.5"></td>
      ${isOwner?`<td><input type="number" class="daily-revenue" data-id="${e.id}" value="${d.revenue||0}" min="0"></td>`:''}
      <td><input type="number" class="daily-patients" data-id="${e.id}" value="${d.patients||0}" min="0"></td>
    </tr>`;
  }
  html+=`</table></div>
    <button class="btn btn-success" id="save-daily" style="margin-top:14px">💾 Сохранить</button>
  </div>`;
  return html;
}

function bindDaily(){
  const saveBtn=document.getElementById('save-daily');
  if(saveBtn)saveBtn.onclick=()=>{
    const date=document.getElementById('daily-date').value;
    if(!date){toast('Выберите дату');return}
    const data={};
    document.querySelectorAll('tr[data-emp]').forEach(tr=>{
      const id=parseInt(tr.dataset.emp);
      const worked=parseFloat(tr.querySelector('.daily-worked')?.value)||0;
      const rev=parseFloat(tr.querySelector('.daily-revenue')?.value)||0;
      const pat=parseInt(tr.querySelector('.daily-patients')?.value)||0;
      if(worked||rev||pat)data[id]={worked,revenue:rev,patients:pat};
    });
    LS.set('zp_daily_'+date,data);
    addHistory('Сохранён ввод за '+date);
    toast('Сохранено за '+date);
  };
}

// ========== MONTHLY ==========
function renderMonthly(){
  const days=monthDays(state.month);
  const emps=getActiveEmps();
  const advances=LS.get('zp_advances_'+state.month,{});
  const isOwner=state.role==='owner';
  let totalAll=0;
  let totalRevAll=0;

  let html=`<div class="month-nav">
    <button id="prev-month">◀</button><span>${monthName(state.month)}</span><button id="next-month">▶</button>
    <button class="btn btn-primary btn-sm" id="export-csv" style="margin-left:auto">📥 Экспорт CSV</button>
  </div>`;

  for(const emp of emps){
    let totalWorked=0,totalPatients=0,totalOwnRevenue=0;
    for(const day of days){
      const d=LS.get('zp_daily_'+day,{})[emp.id]||{};
      totalWorked+=d.worked||0;
      totalPatients+=d.patients||0;
      totalOwnRevenue+=d.revenue||0;
    }
    if(emp.calcType==='fixed_month'){totalWorked=0;totalOwnRevenue=0}
    const salary=calcSalary({...emp,_ownRevenue:totalOwnRevenue},totalWorked,totalOwnRevenue);
    const advance=advances[emp.id]||0;
    const toPay=salary-advance;
    totalAll+=toPay;
    totalRevAll+=totalOwnRevenue;

    html+=`<div class="emp-card">
      <div class="emp-name">${emp.name}</div>
      <div class="emp-pos">${emp.position} · ${emp.calcType.replace(/_/g,' ')}</div>
      <div class="emp-stats">
        <div><div class="label">Дней/смен</div><div class="val">${totalWorked}</div></div>
        ${isOwner?`<div><div class="label">Выручка ₽</div><div class="val val-money">${totalOwnRevenue.toLocaleString('ru')}</div></div>`:''}
        <div><div class="label">Пациентов</div><div class="val">${totalPatients}</div></div>
        <div><div class="label">Начислено ₽</div><div class="val val-money">${salary.toLocaleString('ru')}</div></div>
        ${isOwner?`<div><div class="label">Аванс ₽</div><div class="val"><input type="number" class="advance-input" data-id="${emp.id}" value="${advance}" min="0" style="width:80px"></div></div>`:`<div><div class="label">Аванс ₽</div><div class="val">${advance.toLocaleString('ru')}</div></div>`}
        <div><div class="label">К выдаче ₽</div><div class="val val-total">${toPay.toLocaleString('ru')}</div></div>
      </div>
    </div>`;
  }

  if(isOwner){
    html+=`<div class="fot-total">ФОТ: ${totalAll.toLocaleString('ru')} ₽ · Выручка: ${totalRevAll.toLocaleString('ru')} ₽</div>`;
  } else {
    html+=`<div class="fot-total">ФОТ: ${totalAll.toLocaleString('ru')} ₽</div>`;
  }

  return html;
}

function bindMonthly(){
  const prev=document.getElementById('prev-month');
  const next=document.getElementById('next-month');
  const exp=document.getElementById('export-csv');
  if(prev)prev.onclick=()=>{
    const[y,m]=state.month.split('-').map(Number);
    let nm=m-1,ny=y;if(nm<1){nm=12;ny--}
    state.month=ny+'-'+String(nm).padStart(2,'0');
    render();
  };
  if(next)next.onclick=()=>{
    const[y,m]=state.month.split('-').map(Number);
    let nm=m+1,ny=y;if(nm>12){nm=1;ny++}
    state.month=ny+'-'+String(nm).padStart(2,'0');
    render();
  };
  if(state.role==='owner'){
    document.querySelectorAll('.advance-input').forEach(inp=>{
      inp.onchange=()=>{
        const advances=LS.get('zp_advances_'+state.month,{});
        advances[inp.dataset.id]=parseFloat(inp.value)||0;
        LS.set('zp_advances_'+state.month,advances);
        render();
      };
    });
  }
  if(exp)exp.onclick=()=>exportCSV();
}

function exportCSV(){
  const days=monthDays(state.month);
  const emps=getActiveEmps();
  const advances=LS.get('zp_advances_'+state.month,{});
  let csv='\uFEFFСотрудник;Должность;Дней;Пациентов;Выручка;Начислено;Аванс;К выдаче\n';
  for(const emp of emps){
    let tw=0,tp=0,trv=0;
    for(const day of days){const d=(LS.get('zp_daily_'+day,{})[emp.id]||{});tw+=d.worked||0;tp+=d.patients||0;trv+=d.revenue||0}
    const sal=calcSalary({...emp,_ownRevenue:trv},tw,trv);
    const adv=advances[emp.id]||0;
    csv+=`${emp.name};${emp.position};${tw};${tp};${trv};${sal};${adv};${sal-adv}\n`;
  }
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='payroll_'+state.month+'.csv';a.click();
  toast('CSV экспортирован');
}

// ========== SCHEDULE CALENDAR ==========
function renderSchedule(){
  const[y,m]=state.month.split('-').map(Number);
  const daysInMonth=new Date(y,m,0).getDate();
  const dayNames=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const emps=getActiveEmps();
  const scheduleKey='zp_schedule_'+state.month.replace('-','_');
  const schedule=LS.get(scheduleKey,{});
  const today=todayStr();

  let html=`<div class="card"><h3>🗓 График работы</h3>
    <div class="schedule-controls">
      <button id="sch-prev-month">◀</button>
      <span style="font-weight:600">${monthName(state.month)}</span>
      <button id="sch-next-month">▶</button>
      <button class="btn btn-success btn-sm" id="save-schedule" style="margin-left:auto">💾 Сохранить график</button>
    </div>`;

  html+=`<div class="schedule-wrap"><table class="schedule-table"><thead><tr><th class="name-col">Сотрудник</th>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateObj=new Date(y,m-1,d);
    const dow=dateObj.getDay();
    const mappedDow=dow===0?6:dow-1;
    const isWeekend=dow===0||dow===6;
    const isToday=fmtDate(dateObj)===today;
    let cls='day-header';
    if(isWeekend)cls+=' weekend';
    if(isToday)cls+=' today-col';
    html+=`<th class="${cls}"><div class="day-num">${d}</div><div class="day-name">${dayNames[mappedDow]}</div></th>`;
  }
  html+=`</tr></thead><tbody>`;

  const statusCycle=['Р','О','В','П'];
  const statusLabels={Р:'Рабочий',О:'Отпуск',В:'Выходной',П:'Практика'};
  const statusCls={Р:'working',О:'vacation',В:'off',П:'practice'};
  const statusLblCls={Р:'s-work',О:'s-vacation',В:'s-off',П:'s-practice'};
  for(const emp of emps){
    const empSch=schedule[emp.id]||{};
    html+=`<tr><td class="name-col">${emp.name}</td>`;
    for(let d=1;d<=daysInMonth;d++){
      const dateObj=new Date(y,m-1,d);
      const dow=dateObj.getDay();
      const isWeekend=dow===0||dow===6;
      const isToday=fmtDate(dateObj)===today;
      // Default: Р for weekdays, В for weekends
      const val=empSch[d]||(isWeekend?'В':'Р');
      let cls='shift-cell';
      cls+=' '+statusCls[val];
      if(isWeekend)cls+=' weekend';
      if(isToday)cls+=' today-cell';
      const label=`<span class="shift-label ${statusLblCls[val]}">${val}</span>`;
      html+=`<td class="${cls}" data-emp="${emp.id}" data-day="${d}" data-val="${val}" title="${emp.name} — ${d}: ${statusLabels[val]}">${label}</td>`;
    }
    html+=`</tr>`;
  }

  html+=`</tbody></table></div></div>`;
  return html;
}

function bindSchedule(){
  const prev=document.getElementById('sch-prev-month');
  const next=document.getElementById('sch-next-month');
  const save=document.getElementById('save-schedule');

  if(prev)prev.onclick=()=>{
    const[y,m]=state.month.split('-').map(Number);
    let nm=m-1,ny=y;if(nm<1){nm=12;ny--}
    state.month=ny+'-'+String(nm).padStart(2,'0');
    render();
  };
  if(next)next.onclick=()=>{
    const[y,m]=state.month.split('-').map(Number);
    let nm=m+1,ny=y;if(nm>12){nm=1;ny++}
    state.month=ny+'-'+String(nm).padStart(2,'0');
    render();
  };

  const statusCycle=['Р','О','В','П'];
  // Click cells to cycle status
  document.querySelectorAll('.shift-cell').forEach(cell=>{
    cell.onclick=()=>{
      const empId=parseInt(cell.dataset.emp);
      const day=parseInt(cell.dataset.day);
      const scheduleKey='zp_schedule_'+state.month.replace('-','_');
      const schedule=LS.get(scheduleKey,{});
      if(!schedule[empId])schedule[empId]={};
      const cur=cell.dataset.val||'Р';
      const idx=statusCycle.indexOf(cur);
      const next=statusCycle[(idx+1)%statusCycle.length];
 // Only save if different from default
      const dateObj=new Date(parseInt(state.month.split('-')[0]),parseInt(state.month.split('-')[1])-1,day);
      const isWeekend=dateObj.getDay()===0||dateObj.getDay()===6;
      const defaultVal=isWeekend?'В':'Р';
      if(next===defaultVal)delete schedule[empId][day];
      else schedule[empId][day]=next;
      LS.set(scheduleKey,schedule);
      render();
    };
  });

  if(save){
    save.onclick=()=>{
      toast('График сохранён');
      addHistory('Сохранён график за '+state.month);
    };
  }
}

function bindAdminReportView(){
  const dateInput=document.getElementById('admin-report-date');
  const load=()=>{
    state.reportDate=dateInput.value;
    const data=LS.get('zp_report_'+state.reportDate,null);
    const cont=document.getElementById('admin-report-content');
    if(!data){cont.innerHTML='<div class="empty-msg">Нет отчёта за эту дату</div>';return}
    cont.innerHTML=renderReportReadonly(data);
  };
  dateInput.onchange=load;
  load();
}

  for(const s of(data.shifts||[])){
    html+=`<tr><td>${s.name}</td><td>${s.position}</td><td>${s.start||''}</td><td>${s.end||''}</td><td>${s.hours||''}</td><td>${s.late||0}</td><td>${s.note||''}</td></tr>`;
  }

  html+='<h4 style="margin:14px 0 8px">Приём пациентов и оплата</h4><div class="table-wrap"><table><tr><th>Пациент</th><th>Врач</th><th>Услуга</th><th>Нал ₽</th><th>Безнал ₽</th><th>Способ</th><th>Итого</th></tr>';
  let tNal=0,tBez=0;
  for(const p of(data.patients||[])){
    tNal+=p.cash||0;tBez+=p.cashless||0;
    html+=`<tr><td>${p.patientName}</td><td>${p.doctor}</td><td>${p.service||''}</td><td>${(p.cash||0).toLocaleString('ru')}</td><td>${(p.cashless||0).toLocaleString('ru')}</td><td>${p.method||''}</td><td>${((p.cash||0)+(p.cashless||0)).toLocaleString('ru')}</td></tr>`;
  }
  html+=`<tr style="font-weight:700;color:var(--green)"><td colspan=3>ИТОГО</td><td>${tNal.toLocaleString('ru')}</td><td>${tBez.toLocaleString('ru')}</td><td></td><td>${(tNal+tBez).toLocaleString('ru')}</td></tr>`;
  html+=`</table></div>`;

  html+='<h4 style="margin:14px 0 8px">Расходы за день</h4><div class="table-wrap"><table><tr><th>Категория</th><th>Описание</th><th>Кому/Куда</th><th>Сумма ₽</th><th>Нал/Безнал</th><th>Документ</th><th>Примечание</th></tr>';
  let tExp=0;
  for(const e of(data.expenses||[])){
    tExp+=e.amount||0;

  }
  html+=`<tr style="font-weight:700;color:var(--red)"><td colspan=3>ИТОГО РАСХОДЫ</td><td>${tExp.toLocaleString('ru')}</td><td colspan=3></td></tr>`;
  html+='</table></div>';
  return html;
}

  }

function shiftRow(s,emps){
  const opts=emps.map(e=>`<option value="${e.name}" ${e.name===s.name?'selected':''}>${e.name}</option>`).join('');
  return `<tr class="shift-row"><td><select class="shift-name">${opts}<option value="">-- вручную --</option></select>
    <input type="text" class="shift-name-manual" value="${s.name==='opts'?'':s.name}" style="display:none;margin-top:4px"></td>
    <td><input type="text" class="shift-position" value="${s.position||''}"></td>
    <td><input type="time" class="shift-start" value="${s.start||''}"></td>
    <td><input type="time" class="shift-end" value="${s.end||''}"></td>
    <td class="shift-hours">${s.hours||''}</td>
    <td><input type="number" class="shift-late" value="${s.late||0}" min="0"></td>
    <td><input type="text" class="shift-note" value="${s.note||''}"></td>
    <td><button class="btn btn-danger btn-sm del-row">✕</button></td></tr>`;
}

function patientRow(p,doctors){
  const opts=doctors.map(e=>`<option value="${e.name}" ${e.name===p.doctor?'selected':''}>${e.name}</option>`).join('');
  return `<tr class="patient-row"><td><input type="text" class="pat-name" value="${p.patientName||''}"></td>
    <td><select class="pat-doctor"><option value="">--</option>${opts}</select></td>
    <td><input type="text" class="pat-service" value="${p.service||''}"></td>
    <td><input type="number" class="pat-cash" value="${p.cash||0}" min="0"></td>
    <td><input type="number" class="pat-cashless" value="${p.cashless||0}" min="0"></td>
    <td><select class="pat-method"><option value="">—</option><option value="Сбер" ${p.method==='Сбер'?'selected':''}>Сбер</option><option value="ВТБ" ${p.method==='ВТБ'?'selected':''}>ВТБ</option><option value="Т-Банк" ${p.method==='Т-Банк'?'selected':''}>Т-Банк</option><option value="СБП QR" ${p.method==='СБП QR'?'selected':''}>СБП QR</option><option value="Другое" ${p.method==='Другое'?'selected':''}>Другое</option></select></td>
    <td class="pat-total">${((p.cash||0)+(p.cashless||0)).toLocaleString('ru')}</td>
    <td><button class="btn btn-danger btn-sm del-row">✕</button></td></tr>`;
}

    const doctors=emps.filter(e=>e.position.includes('Врач')||e.position.includes('Хирург')||e.position.includes('Терапевт'));
    const tbody=document.getElementById('patients-table');
    tbody.insertAdjacentHTML('beforeend',patientRow({},doctors));
    bindPatientRowEvents(tbody.lastElementChild);
  };
  if(addExp)addExp.onclick=()=>{
    const tbody=document.getElementById('expenses-table');
    tbody.insertAdjacentHTML('beforeend',expenseRow({}));
    bindExpenseRowEvents(tbody.lastElementChild);
  };

  document.querySelectorAll('.shift-row').forEach(bindShiftRowEvents);
  document.querySelectorAll('.patient-row').forEach(bindPatientRowEvents);
  document.querySelectorAll('.expense-row').forEach(bindExpenseRowEvents);
  calcReportTotals();

  if(saveBtn)saveBtn.onclick=()=>{
    const today=todayStr();
    const data={shifts:[],patients:[],expenses:[]};
    document.querySelectorAll('.shift-row').forEach(tr=>{
      const nameSel=tr.querySelector('.shift-name');
      const nameMan=tr.querySelector('.shift-name-manual');
      const name=nameSel.value==='-- вручную --'?(nameMan.value||''):nameSel.value;
      data.shifts.push({
        name,
        position:tr.querySelector('.shift-position').value,
        start:tr.querySelector('.shift-start').value,
        end:tr.querySelector('.shift-end').value,
        hours:tr.querySelector('.shift-hours').textContent,
        late:parseInt(tr.querySelector('.shift-late').value)||0,
        note:tr.querySelector('.shift-note').value
      });
    });
    document.querySelectorAll('.patient-row').forEach(tr=>{
      const cash=parseInt(tr.querySelector('.pat-cash').value)||0;
      const cashless=parseInt(tr.querySelector('.pat-cashless').value)||0;
      data.patients.push({
        patientName:tr.querySelector('.pat-name').value,
        doctor:tr.querySelector('.pat-doctor').value,
        service:tr.querySelector('.pat-service').value,
        cash,cashless,
        method:tr.querySelector('.pat-method').value
      });
    });
    document.querySelectorAll('.expense-row').forEach(tr=>{
      data.expenses.push({
        category:tr.querySelector('.exp-category').value,
        description:tr.querySelector('.exp-desc').value,
        destination:tr.querySelector('.exp-dest').value,
        amount:parseInt(tr.querySelector('.exp-amount').value)||0,
        type:tr.querySelector('.exp-type').value,
        document:tr.querySelector('.exp-doc').value,
        note:tr.querySelector('.exp-note').value
      });
    });
    LS.set('zp_report_'+today,data);
    addHistory('Сохранён отчёт администратора за '+today);
    toast('Отчёт сохранён');
  };
}

function bindShiftRowEvents(tr){
  const nameSel=tr.querySelector('.shift-name');
  const nameMan=tr.querySelector('.shift-name-manual');
  if(nameSel){
    nameSel.onchange=()=>{
      nameMan.style.display=nameSel.value==='-- вручную --'?'block':'none';
      if(nameSel.value!=='-- вручную --'){
        const emp=getActiveEmps().find(e=>e.name===nameSel.value);
        if(emp)tr.querySelector('.shift-position').value=emp.position;
      }
    };
  }
  const start=tr.querySelector('.shift-start');
  const end=tr.querySelector('.shift-end');
  const updHours=()=>{
    if(start.value&&end.value){
      const[sh,sm]=start.value.split(':').map(Number);
      const[eh,em]=end.value.split(':').map(Number);
      let h=(eh+em/60)-(sh+sm/60);
      if(h<0)h+=24;
      tr.querySelector('.shift-hours').textContent=h.toFixed(1);
    }else{tr.querySelector('.shift-hours').textContent=''}
  };
  if(start)start.onchange=updHours;
  if(end)end.onchange=updHours;
  tr.querySelector('.del-row').onclick=()=>tr.remove();
}

function bindPatientRowEvents(tr){
  const cashInp=tr.querySelector('.pat-cash');
  const cashlessInp=tr.querySelector('.pat-cashless');
  const upd=()=>{
    const c=parseInt(cashInp.value)||0;
    const b=parseInt(cashlessInp.value)||0;
    tr.querySelector('.pat-total').textContent=(c+b).toLocaleString('ru');
    calcReportTotals();
  };
  cashInp.oninput=upd;cashlessInp.oninput=upd;
  tr.querySelector('.del-row').onclick=()=>{tr.remove();calcReportTotals()};
}

function bindExpenseRowEvents(tr){
  const amtInp=tr.querySelector('.exp-amount');
  amtInp.oninput=calcReportTotals;
  tr.querySelector('.del-row').onclick=()=>{tr.remove();calcReportTotals()};
}

function calcReportTotals(){
  let tCash=0,tBez=0;
  document.querySelectorAll('.patient-row').forEach(tr=>{
    tCash+=parseInt(tr.querySelector('.pat-cash').value)||0;
    tBez+=parseInt(tr.querySelector('.pat-cashless').value)||0;
  });
  const pt=document.getElementById('patients-totals');
  if(pt)pt.textContent=`Нал: ${tCash.toLocaleString('ru')} · Безнал: ${tBez.toLocaleString('ru')} · Всего: ${(tCash+tBez).toLocaleString('ru')} · Пациентов: ${document.querySelectorAll('.patient-row').length}`;

  let tExp=0;
  document.querySelectorAll('.expense-row').forEach(tr=>{
    tExp+=parseInt(tr.querySelector('.exp-amount').value)||0;
  });
  const et=document.getElementById('expenses-total');
  if(et)et.textContent=`Итого расходы: ${tExp.toLocaleString('ru')} ₽`;
}

// ========== EMPLOYEES ==========
let empEditId=null;
let showAddEmp=false;

function renderEmployees(){
  const emps=getEmps();
  const positions=getPositions();
  const editingEmp=empEditId?emps.find(e=>e.id===empEditId):null;
  const currentRole=editingEmp?editingEmp.appRole||'none':'none';
  const currentLogin=editingEmp?(editingEmp.login||''):'';
  const currentPass=editingEmp?(editingEmp.pass||''):'';

  let html=`<div class="card"><h3>👥 Сотрудники (${emps.length})</h3>
    <button class="btn btn-primary btn-sm" id="toggle-add-emp" style="margin-bottom:14px">+ Добавить сотрудника</button>
    <div id="add-emp-form" class="${showAddEmp?'':'hidden'}" style="margin-bottom:18px">
      <div class="card" style="background:var(--input-bg)">
        <h4 id="emp-form-title">Новый сотрудник</h4>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:10px">
          <div><label style="font-size:12px;color:var(--text2)">ФИО</label><input type="text" id="emp-fio"></div>
          <div><label style="font-size:12px;color:var(--text2)">Должность</label><select id="emp-position">${positions.map(p=>`<option value="${p}">${p}</option>`).join('')}<option value="__new__">+ Новая должность...</option></select><input type="text" id="emp-position-new" style="display:none;margin-top:4px" placeholder="Новая должность"></div>
          <div><label style="font-size:12px;color:var(--text2)">Тип расчёта</label><select id="emp-calc">
            <option value="fixed_day">Фикс за смену</option>
            <option value="fixed_month">Фикс за месяц</option>
            <option value="percent">Процент</option>
            <option value="fixed_day_percent">Фикс/смен + %</option>
            <option value="fixed_month_percent">Фикс/мес + %</option>
            <option value="fixed_day_percent_own">Фикс/смен + % от своей выручки</option>
          </select></div>
          <div><label style="font-size:12px;color:var(--text2)">Фикс за смену ₽</label><input type="number" id="emp-fixed-day" value="0" min="0"></div>
          <div><label style="font-size:12px;color:var(--text2)">Фикс за месяц ₽</label><input type="number" id="emp-fixed-month" value="0" min="0"></div>
          <div><label style="font-size:12px;color:var(--text2)">Процент %</label><input type="number" id="emp-percent" value="0" min="0" max="100"></div>
          <div><label style="font-size:12px;color:var(--text2)">Роль в приложении</label><select id="emp-app-role">
            <option value="none" ${currentRole==='none'?'selected':''}>Нет доступа</option>
            <option value="owner" ${currentRole==='owner'?'selected':''}>Владелец (полный доступ)</option>
            <option value="manager" ${currentRole==='manager'?'selected':''}>Управляющая (ввод + зарплаты)</option>
            <option value="admin" ${currentRole==='admin'?'selected':''}>Администратор (отчёт за сегодня)</option>
          </select></div>
          <div id="emp-cred-fields"><label style="font-size:12px;color:var(--text2)">Логин</label><input type="text" id="emp-login" value="${currentLogin}" placeholder="Логин для входа"></div>
          <div id="emp-pass-fields"><label style="font-size:12px;color:var(--text2)">Пароль</label><input type="password" id="emp-pass" value="${currentPass}" placeholder="Пароль для входа"></div>
        </div>
        <button class="btn btn-success btn-sm" id="save-emp">💾 Сохранить</button>
        <button class="btn btn-outline btn-sm" id="cancel-emp" style="margin-left:8px">Отмена</button>
      </div>
    </div>
    <div class="table-wrap"><table>
    <tr><th>ФИО</th><th>Должность</th><th>Тип расчёта</th><th>Фикс/день</th><th>Фикс/мес</th><th>%</th><th>Роль</th><th>Статус</th><th></th></tr>`;
  for(const e of emps){
    const roleCls=e.appRole&&e.appRole!=='none'?e.appRole:'none';
    const roleText=e.appRole&&e.appRole!=='none'?roleLabel(e.appRole):'—';
    html+=`<tr><td>${e.name}</td><td>${e.position}</td><td>${e.calcType.replace(/_/g,' ')}</td>
      <td>${e.fixedDay||''}</td><td>${e.fixedMonth||''}</td><td>${e.percent||''}</td>
      <td><span class="role-badge ${roleCls}">${roleText}</span></td>
      <td><span style="color:${e.active?'var(--green)':'var(--red)'}">${e.active?'Активен':'Неактивен'}</span></td>
      <td class="row-btns">
        <button class="btn btn-outline btn-sm edit-emp" data-id="${e.id}">✏️</button>
        <button class="btn ${e.active?'btn-warning':'btn-success'} btn-sm toggle-emp" data-id="${e.id}">${e.active?'⏸':'▶'}</button>
        <button class="btn btn-danger btn-sm del-emp" data-id="${e.id}">🗑</button>
      </td></tr>`;
  }
  html+=`</table></div></div>`;

  html+=`<div class="card"><h3>📌 Должности</h3>
    <div style="margin-bottom:10px;display:flex;gap:8px">
      <input type="text" id="new-position" placeholder="Новая должность" style="max-width:200px">
      <button class="btn btn-primary btn-sm" id="add-position">+</button>
    </div><div>`;
  for(const p of positions){
    const hasEmp=emps.some(e=>e.position===p);
    html+=`<span class="position-tag">${p}${!hasEmp?` <span class="del-pos" data-pos="${p}" title="Удалить">✕</span>`:''}</span>`;
  }
  html+=`</div></div>`;

  return html;
}

function bindEmployees(){
  const toggleAdd=document.getElementById('toggle-add-emp');
  if(toggleAdd)toggleAdd.onclick=()=>{
    showAddEmp=!showAddEmp;
    empEditId=null;
    render();
  };

  // Show/hide login/pass fields based on role
  const roleSelect=document.getElementById('emp-app-role');
  function toggleCredFields(){
    const role=roleSelect?roleSelect.value:'none';
    const credFields=document.getElementById('emp-cred-fields');
    const passFields=document.getElementById('emp-pass-fields');
    const show=role&&role!=='none';
    if(credFields)credFields.style.display=show?'':'none';
    if(passFields)passFields.style.display=show?'':'none';
  }
  if(roleSelect)roleSelect.onchange=toggleCredFields;
  toggleCredFields();

  const posSel=document.getElementById('emp-position');
  if(posSel)posSel.onchange=()=>{
    document.getElementById('emp-position-new').style.display=posSel.value==='__new__'?'block':'none';
  };

  const cancelBtn=document.getElementById('cancel-emp');
  if(cancelBtn)cancelBtn.onclick=()=>{showAddEmp=false;empEditId=null;render()};

  const saveBtn=document.getElementById('save-emp');
  if(saveBtn)saveBtn.onclick=()=>{
    const posSel=document.getElementById('emp-position');
    let position=posSel.value;
    if(position==='__new__'){
      position=document.getElementById('emp-position-new').value.trim();
      if(!position){toast('Введите название должности');return}
      const ps=getPositions();
      if(!ps.includes(position)){ps.push(position);LS.set('zp_positions',ps)}
    }
    const name=document.getElementById('emp-fio').value.trim();
    if(!name){toast('Введите ФИО');return}
    const appRole=document.getElementById('emp-app-role').value;
    const login=appRole!=='none'?(document.getElementById('emp-login').value.trim()):'';
    const pass=appRole!=='none'?(document.getElementById('emp-pass').value):'';
    if(appRole!=='none'&&(!login||!pass)){toast('Укажите логин и пароль для роли с доступом');return}

    const obj={
      name,
      position,
      calcType:document.getElementById('emp-calc').value,
      fixedDay:parseInt(document.getElementById('emp-fixed-day').value)||0,
      fixedMonth:parseInt(document.getElementById('emp-fixed-month').value)||0,
      percent:parseInt(document.getElementById('emp-percent').value)||0,
      active:true,
      appRole:appRole==='none'?undefined:appRole,
      login:login||undefined,
      pass:pass||undefined
    };
    const emps=getEmps();
    if(empEditId){
      const idx=emps.findIndex(e=>e.id===empEditId);
      if(idx>=0){
        obj.id=empEditId;
        obj.active=emps[idx].active;
        emps[idx]=obj;
      }
      addHistory('Изменён сотрудник: '+name);
    }else{
      obj.id=empIdGen();
      emps.push(obj);
      addHistory('Добавлен сотрудник: '+name);
    }
    LS.set('zp_employees',emps);
    showAddEmp=false;empEditId=null;
    render();toast('Сохранено');
  };

  document.querySelectorAll('.edit-emp').forEach(b=>{
    b.onclick=()=>{
      empEditId=parseInt(b.dataset.id);
      const emp=getEmps().find(e=>e.id===empEditId);
      if(!emp)return;
      showAddEmp=true;render();
      setTimeout(()=>{
        document.getElementById('emp-fio').value=emp.name;
        const posSel=document.getElementById('emp-position');
        // Try to set position; if not found, it's custom
        const posOpts=Array.from(posSel.options).map(o=>o.value);
        if(posOpts.includes(emp.position)){posSel.value=emp.position}
        else{
          posSel.value='__new__';
          document.getElementById('emp-position-new').style.display='block';
          document.getElementById('emp-position-new').value=emp.position;
        }
        document.getElementById('emp-calc').value=emp.calcType;
        document.getElementById('emp-fixed-day').value=emp.fixedDay;
        document.getElementById('emp-fixed-month').value=emp.fixedMonth;
        document.getElementById('emp-percent').value=emp.percent;
        document.getElementById('emp-app-role').value=emp.appRole||'none';
        document.getElementById('emp-login').value=emp.login||'';
        document.getElementById('emp-pass').value=emp.pass||'';
        document.getElementById('emp-form-title').textContent='Редактирование: '+emp.name;
        // Trigger visibility update for cred fields
        const roleSelect=document.getElementById('emp-app-role');
        const show=roleSelect.value&&roleSelect.value!=='none';
        document.getElementById('emp-cred-fields').style.display=show?'':'none';
        document.getElementById('emp-pass-fields').style.display=show?'':'none';
      },50);
    };
  });

  document.querySelectorAll('.toggle-emp').forEach(b=>{
    b.onclick=()=>{
      const id=parseInt(b.dataset.id);
      const emps=getEmps();
      const idx=emps.findIndex(e=>e.id===id);
      if(idx>=0){emps[idx].active=!emps[idx].active;LS.set('zp_employees',emps);addHistory((emps[idx].active?'Активирован':'Деактивирован')+': '+emps[idx].name);render()}
    };
  });

  document.querySelectorAll('.del-emp').forEach(b=>{
    b.onclick=()=>{
      if(!confirm('Удалить сотрудника?'))return;
      const id=parseInt(b.dataset.id);
      let emps=getEmps();emps=emps.filter(e=>e.id!==id);LS.set('zp_employees',emps);addHistory('Удалён сотрудник id='+id);render();toast('Удалён');
    };
  });

  const addPos=document.getElementById('add-position');
  if(addPos)addPos.onclick=()=>{
    const inp=document.getElementById('new-position');
    const val=inp.value.trim();
    if(!val)return;
    const ps=getPositions();
    if(ps.includes(val)){toast('Уже есть');return}
    ps.push(val);LS.set('zp_positions',ps);addHistory('Добавлена должность: '+val);render();
  };

  document.querySelectorAll('.del-pos').forEach(s=>{
    s.onclick=()=>{
      const pos=s.dataset.pos;
      let ps=getPositions();ps=ps.filter(p=>p!==pos);LS.set('zp_positions',ps);addHistory('Удалена должность: '+pos);render();
    };
  });
}

// ========== SETTINGS ==========
function renderSettings(){
  const creds=LS.get('zp_creds',{});
  let html=`<div class="card"><h3>⚙️ Настройки</h3>

    <div class="settings-section">
      <h4>🔑 Пароль управляющей</h4>
      <div class="settings-row"><label>Логин</label><input type="text" id="mgr-login" value="${creds.manager?.login||''}"></div>
      <div class="settings-row"><label>Пароль</label><input type="text" id="mgr-pass" value="${creds.manager?.pass||''}"></div>
      <button class="btn btn-primary btn-sm" id="save-mgr">Сохранить</button>
    </div>

    <div class="settings-section">
      <h4>🔑 Пароль администратора</h4>
      <div class="settings-row"><label>Логин</label><input type="text" id="adm-login" value="${creds.admin?.login||''}"></div>
      <div class="settings-row"><label>Пароль</label><input type="text" id="adm-pass" value="${creds.admin?.pass||''}"></div>
      <button class="btn btn-primary btn-sm" id="save-adm">Сохранить</button>
    </div>

    <div class="settings-section">
      <h4>💾 Данные</h4>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-success btn-sm" id="export-json">📥 Экспорт JSON</button>
        <button class="btn btn-primary btn-sm" id="import-json">📤 Импорт JSON</button>
        <button class="btn btn-danger btn-sm" id="clear-data">🗑 Очистить все данные</button>
      </div>
      <input type="file" id="import-file" accept=".json" style="display:none">
    </div>
  </div>`;
  return html;
}

function bindSettings(){
  const saveMgr=document.getElementById('save-mgr');
  if(saveMgr)saveMgr.onclick=()=>{
    const creds=LS.get('zp_creds',{});
    creds.manager={login:document.getElementById('mgr-login').value.trim(),pass:document.getElementById('mgr-pass').value};
    LS.set('zp_creds',creds);toast('Сохранено');addHistory('Изменён пароль управляющей');
  };
  const saveAdm=document.getElementById('save-adm');
  if(saveAdm)saveAdm.onclick=()=>{
    const creds=LS.get('zp_creds',{});
    creds.admin={login:document.getElementById('adm-login').value.trim(),pass:document.getElementById('adm-pass').value};
    LS.set('zp_creds',creds);toast('Сохранено');addHistory('Изменён пароль администратора');
  };
  const expBtn=document.getElementById('export-json');
  if(expBtn)expBtn.onclick=()=>{
    const data={};
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k.startsWith('zp_'))data[k]=LS.get(k);
    }
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='payroll_backup_'+todayStr()+'.json';a.click();
    toast('Экспорт выполнен');
  };
  const impBtn=document.getElementById('import-json');
  const impFile=document.getElementById('import-file');
  if(impBtn)impBtn.onclick=()=>impFile.click();
  if(impFile)impFile.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        for(const[k,v] of Object.entries(data)){LS.set(k,v)}
        toast('Импорт выполнен');addHistory('Импорт данных');render();
      }catch(e){toast('Ошибка: неверный JSON')}
    };
    reader.readAsText(file);
  };
  const clearBtn=document.getElementById('clear-data');
  if(clearBtn)clearBtn.onclick=()=>{
    if(!confirm('Удалить ВСЕ данные? Это необратимо!'))return;
    const keys=[];
    for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('zp_'))keys.push(k)}
    keys.forEach(k=>localStorage.removeItem(k));
    initDefaults();
    toast('Все данные очищены');render();
  };
}

window.logout=logout;

render();
})();
</script>
