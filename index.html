function bindSettings(){
  // "Полный доступ" чекбокс включает все остальные
  ['mgr','adm'].forEach(prefix=>{
    const ownerCb=document.getElementById(prefix+'-isOwner');
    if(ownerCb)ownerCb.onchange=()=>{
      document.querySelectorAll('.'+prefix+'-perm').forEach(cb=>{if(cb.id!==prefix+'-isOwner')cb.checked=ownerCb.checked});
    };
  });
  const saveMgr=document.getElementById('save-mgr');
  if(saveMgr)saveMgr.onclick=()=>{
    const creds=LS.get('zp_creds',{});
    creds.manager={login:document.getElementById('mgr-login').value.trim(),pass:document.getElementById('mgr-pass').value};
    LS.set('zp_creds',creds);
    // Обновляем логин/пароль/права в записи сотрудника
    const emps=getEmps();
    const emp=emps.find(e=>e.appRole==='manager');
    if(emp){
      emp.login=creds.manager.login;emp.pass=creds.manager.pass;
      const perms={};
      document.querySelectorAll('.mgr-perm').forEach(cb=>{perms[cb.dataset.perm]=cb.checked});
      emp.permissions=perms;
      LS.set('zp_employees',emps);
      cloudSet('zp_employees',emps);
    }
    toast('Сохранено');addHistory('Изменён пароль управляющей');
  };
  const saveAdm=document.getElementById('save-adm');
  if(saveAdm)saveAdm.onclick=()=>{
    const creds=LS.get('zp_creds',{});
    creds.admin={login:document.getElementById('adm-login').value.trim(),pass:document.getElementById('adm-pass').value};
    LS.set('zp_creds',creds);
    // Обновляем логин/пароль/права в записи сотрудника
    const emps=getEmps();
    const emp=emps.find(e=>e.appRole==='admin');
    if(emp){
      emp.login=creds.admin.login;emp.pass=creds.admin.pass;
      const perms={};
      document.querySelectorAll('.adm-perm').forEach(cb=>{perms[cb.dataset.perm]=cb.checked});
      emp.permissions=perms;
      LS.set('zp_employees',emps);
      cloudSet('zp_employees',emps);
    }
    toast('Сохранено');addHistory('Изменён пароль администратора');
  };
  const expBtn=document.getElementById('export-json');
  if(expBtn)expBtn.onclick=()=>{
    const data={};
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k.startsWith('zp_'))data[k]=LS.get(k);
    }
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='payroll_backup_'+todayStr()+'.json';a.click();
    toast('Экспорт выполнен');
  };
  const impBtn=document.getElementById('import-json');
  const impFile=document.getElementById('import-file');
  if(impBtn)impBtn.onclick=()=>impFile.click();
  if(impFile)impFile.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        for(const[k,v] of Object.entries(data)){LS.set(k,v)}
        toast('Импорт выполнен');addHistory('Импорт данных');render();
      }catch(e){toast('Ошибка: неверный JSON')}
    };
    reader.readAsText(file);
  };
  const clearBtn=document.getElementById('clear-data');
  if(clearBtn)clearBtn.onclick=()=>{
    if(!confirm('Удалить ВСЕ данные? Это необратимо!'))return;
    const keys=[];
    for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('zp_'))keys.push(k)}
    keys.forEach(k=>localStorage.removeItem(k));
    initDefaults();
seedMayData();
    toast('Все данные очищены');render();
  };
  const cloudCheck=document.getElementById('cloud-check');
  if(cloudCheck)cloudCheck.onclick=async()=>{
    const url=document.getElementById('cloud-url').value.trim();
    if(!url){toast('Введите URL Apps Script');return}
    cloudCheck.disabled=true;cloudCheck.textContent='⏳ Проверка...';
    const oldUrl=Cloud.config.url;Cloud.config.url=url.replace(/\/$/,'');
    const p=await Cloud.ping();
    Cloud.config.url=oldUrl;
    cloudCheck.disabled=false;cloudCheck.textContent=' Проверить';
    const st=document.getElementById('cloud-status-text');
    if(p.ok){st.textContent='✅ Подключено (v'+(p.data?.version||'?')+')';st.style.color='var(--green)';toast('Облако доступно')}
    else{st.textContent='❌ Ошибка: '+p.error;st.style.color='var(--red)';toast('Не удалось подключиться')}
  };
  const cloudSave=document.getElementById('cloud-save-config');
  if(cloudSave)cloudSave.onclick=()=>{
    const url=document.getElementById('cloud-url').value.trim();
    const key=document.getElementById('cloud-key').value.trim();
    Cloud.configure(url,key);
    const st=document.getElementById('cloud-status-text');
    st.textContent='⏳ Проверка...';st.style.color='var(--yellow)';
    setTimeout(async()=>{
      const p=await Cloud.ping();
      if(p.ok){st.textContent='✅ Подключено';st.style.color='var(--green)';toast('Настройки облака сохранены')}
      else{st.textContent='❌ Ошибка подключения';st.style.color='var(--red)';toast('URL сохранён, но подключиться не удалось')}
    },500);
  };
  const cloudPull=document.getElementById('cloud-pull');
  if(cloudPull)cloudPull.onclick=()=>{
    if(!confirm('Заменить ВСЕ локальные данные данными из облака?'))return;
    cloudPull.disabled=true;cloudPull.textContent='⏳ Загрузка...';
    Cloud.sync().then(ok=>{
      cloudPull.disabled=false;cloudPull.textContent='⬇️ Загрузить из облака';
      if(ok)render();
    });
  };
  const cloudPush=document.getElementById('cloud-push');
  if(cloudPush)cloudPush.onclick=()=>{
    cloudPush.disabled=true;cloudPush.textContent='⏳ Выгрузка...';
    Cloud.pushAll().then(ok=>{
      cloudPush.disabled=false;cloudPush.textContent='⬆️ Выгрузить в облако';
    });
  };
  const cloudSyncBtn=document.getElementById('cloud-sync');
  if(cloudSyncBtn)cloudSyncBtn.onclick=()=>{
    cloudSyncBtn.disabled=true;cloudSyncBtn.textContent='⏳ Синхронизация...';
    Cloud.sync().then(ok=>{
      cloudSyncBtn.disabled=false;cloudSyncBtn.textContent=' Синхронизировать';
      if(ok)render();
    });
  };
  const cloudReset=document.getElementById('cloud-reset-config');
  if(cloudReset)cloudReset.onclick=()=>{
    if(!confirm('Сбросить настройки облака к значениям по умолчанию?'))return;
    LS.del('zp_cloud_url');LS.del('zp_cloud_key');
    document.getElementById('cloud-url').value=Cloud.defaults.url;
    document.getElementById('cloud-key').value=Cloud.defaults.key;
    Cloud.configure(Cloud.defaults.url,Cloud.defaults.key);
    toast('Настройки облака сброшены');
  };
}
