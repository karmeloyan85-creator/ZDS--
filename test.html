<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test</title></head>
<body style="background:#e8ecf1;padding:40px;font-family:Helvetica">
<h1 style="color:#4A90D9">Hello Karen!</h1>
<p>If you see this, the domain works fine.</p>
<p id="ls-test">LocalStorage test...</p>
<script>
try {
  localStorage.setItem('test', 'ok');
  document.getElementById('ls-test').textContent = 'LocalStorage: OK (' + localStorage.getItem('test') + ')';
} catch(e) {
  document.getElementById('ls-test').textContent = 'LocalStorage ERROR: ' + e.message;
}
</script>
</body>
</html>
